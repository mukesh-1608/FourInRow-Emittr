name: DevSecOps Starter Pipeline

# 1. When should this pipeline run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ----------------------------------------------------
  # JOB 1: Secret Scanning (The Foundation)
  # ----------------------------------------------------
  secret-scanning:
    name: Scan for Hardcoded Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for all branches and tags
          
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ----------------------------------------------------
  # JOB 2: SAST (The Proofreader for Go and TypeScript)
  # ----------------------------------------------------
  sast-scanning:
    name: Static Code Analysis (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          # We are telling Semgrep to look for Go, TS, and React vulnerabilities
          config: >-
            p/default
            p/golang
            p/typescript
            p/react
